<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>ZYCHO ID BOT - Free Fire Account Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --bg-card: #12121a;
  --bg-elevated: #1a1a2a;
  --border: #272736;
  --border-hover: #3f3f55;
  --accent: #6366f1;
  --accent-secondary: #ec4899;
  --accent-tertiary: #10b981;
  --text: #f8fafc;
  --text-muted: #94a3b8;
  --text-subtle: #64748b;
  --radius: 12px;
  --radius-lg: 16px;
  --shadow: 0 4px 20px rgba(0,0,0,0.3);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 1rem;
}

.container { max-width: 600px; margin: 0 auto; }

/* Header */
.header { text-align: center; padding: 1.5rem 0 1rem; }

.logo {
  width: 70px; height: 70px;
  background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
  border-radius: 20px;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 1rem;
  box-shadow: 0 0 30px rgba(99,102,241,0.3);
}

.logo svg { width: 38px; height: 38px; }

h1 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1.8rem; font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.sub { color: var(--text-muted); font-size: 0.8rem; margin-top: 0.25rem; }

/* Card */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.25rem;
  margin-bottom: 1rem;
}

.card-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1rem; font-weight: 600;
  margin-bottom: 1rem;
  display: flex; align-items: center; gap: 0.5rem;
}

/* Form */
.form-group { margin-bottom: 1rem; }

label {
  display: block;
  font-size: 0.7rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.05em;
  color: var(--text-muted);
  margin-bottom: 0.4rem;
}

select, input {
  width: 100%;
  padding: 0.75rem 1rem;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 0.9rem;
  outline: none;
  transition: all 0.2s;
}

select:focus, input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
}

.btn {
  width: 100%;
  padding: 0.85rem;
  background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
  border: none;
  border-radius: var(--radius);
  color: white;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.9rem; font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.btn:hover { transform: translateY(-2px); filter: brightness(1.05); }
.btn:disabled { opacity: 0.5; transform: none; cursor: not-allowed; }

/* Stats */
.stats-row {
  display: flex;
  justify-content: space-between;
  gap: 0.75rem;
  margin-bottom: 1rem;
}

.stat {
  flex: 1;
  background: var(--bg);
  border-radius: var(--radius);
  padding: 0.75rem;
  text-align: center;
}

.stat-value {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1.5rem; font-weight: 700;
  color: var(--accent);
}

.stat-label { font-size: 0.65rem; color: var(--text-subtle); }

/* Progress */
.progress-bar {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
  margin: 1rem 0;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent-tertiary), var(--accent));
  width: 0%;
  transition: width 0.3s ease;
}

/* Output */
.output-area {
  background: var(--bg-elevated);
  border-radius: var(--radius);
  padding: 0.75rem;
  max-height: 350px;
  overflow-y: auto;
  font-family: 'Space Grotesk', monospace;
  font-size: 0.7rem;
}

.account-item {
  padding: 0.7rem;
  border-bottom: 1px solid var(--border);
  animation: fadeIn 0.3s ease;
}
.account-item:last-child { border-bottom: none; }
.account-item.success { border-left: 3px solid var(--accent-tertiary); padding-left: 0.65rem; }
.account-item.error { border-left: 3px solid #ef4444; padding-left: 0.65rem; }

.account-uid { font-weight: 600; color: var(--accent); }
.account-pass { color: var(--accent-tertiary); font-family: monospace; }

/* Key System */
.key-status {
  font-size: 0.75rem;
  padding: 0.6rem;
  border-radius: var(--radius);
  text-align: center;
  margin-top: 0.75rem;
}
.key-status.error { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
.key-status.success { background: rgba(16,185,129,0.15); color: #10b981; border: 1px solid rgba(16,185,129,0.3); }
.key-status.warning { background: rgba(245,158,11,0.15); color: #f59e0b; border: 1px solid rgba(245,158,11,0.3); }

/* Badge */
.badge {
  display: inline-block;
  padding: 0.2rem 0.5rem;
  font-size: 0.6rem;
  font-weight: 600;
  border-radius: 6px;
  background: var(--bg);
}

/* Animations */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-5px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Footer */
.footer {
  text-align: center;
  padding: 1.5rem;
  color: var(--text-subtle);
  font-size: 0.7rem;
}

/* Telegram button */
.telegram-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  width: 100%;
  padding: 0.6rem;
  background: #0088cc;
  border: none;
  border-radius: var(--radius);
  color: white;
  font-size: 0.8rem;
  font-weight: 600;
  text-decoration: none;
  margin-top: 0.5rem;
}
.telegram-btn:hover { background: #0099dd; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo">

      <div class="stats-row">
        <div class="stat">
          <div class="stat-value" id="totalGenerated">0</div>

<script>
// ========== KONFIGURASI ==========
const BOT_TOKEN = '8678259988:AAE4v3hBp2DWexyu4IcBItsWHURSY3drnhY';
const WEBHOOK_URL = window.location.href.split('#')[0]; // URL Netlify Anda

// ========== DATA STORAGE ==========
let validKeys = [];
let currentKey = null;
let accounts = [];
let isGenerating = false;
let generateInterval = null;

// Load keys dari localStorage
function loadKeys() {
  const saved = localStorage.getItem('zycho_valid_keys');
  if (saved) {
    try {
      const keys = JSON.parse(saved);
      const now = Date.now();
      validKeys = keys.filter(k => k.expiry > now);
      saveKeys();
    } catch(e) {}
  }
}

function saveKeys() {
  localStorage.setItem('zycho_valid_keys', JSON.stringify(validKeys));
}

function addKey(key, expiryDays) {
  const expiry = Date.now() + (expiryDays * 24 * 60 * 60 * 1000);
  validKeys = validKeys.filter(k => k.key !== key);
  validKeys.push({ key, expiry, createdAt: Date.now() });
  saveKeys();
}

function removeKey(key) {
  validKeys = validKeys.filter(k => k.key !== key);
  saveKeys();
}

function checkKey(key) {
  const found = validKeys.find(k => k.key === key);
  if (!found) return false;
  if (found.expiry < Date.now()) {
    validKeys = validKeys.filter(k => k.key !== key);
    saveKeys();
    return false;
  }
  return true;
}

// ========== VERIFIKASI KEY ==========
function verifyAccessKey() {
  const keyInput = document.getElementById('keyInput');
  const key = keyInput.value.trim();
  const statusDiv = document.getElementById('keyStatus');
  
  if (!key) {
    statusDiv.className = 'key-status error';
    statusDiv.innerHTML = '❌ Masukkan key terlebih dahulu!';
    return;
  }
  
  // Cek key lokal
  if (checkKey(key)) {
    statusDiv.className = 'key-status success';
    statusDiv.innerHTML = '✅ Key valid! Akses diberikan.';
    currentKey = key;
    document.getElementById('keyCard').style.display = 'none';
    document.getElementById('generatorCard').style.display = 'block';
    
    // Kirim notifikasi ke bot
    sendToTelegram(`✅ *AKSES GRATIS*\nKey: ${key}\nUser: ${navigator.userAgent.split(' ')[0]}\nStatus: AKTIF`);
  } else {
    // Kirim request ke bot untuk approval
    sendToTelegram(`🔑 *VERIFIKASI KEY BARU*\nKey: ${key}\nUser-Agent: ${navigator.userAgent.substring(0, 100)}\n\nBalas dengan:\n/approve ${key} 7\n/reject ${key}`);
    
    statusDiv.className = 'key-status warning';
    statusDiv.innerHTML = '⏳ Key tidak dikenal. Menunggu approval admin...<br><small>Hubungi @ZYCHO_BOT</small>';
  }
}

// Kirim pesan ke Telegram
async function sendToTelegram(message) {
  try {
    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        chat_id: 'YOUR_ADMIN_CHAT_ID', // Ganti dengan chat ID admin
        text: message,
        parse_mode: 'Markdown'
      })
    });
  } catch(e) { console.log('Telegram error:', e); }
}

// ========== GENERATE AKUN ==========
function generateUID() {
  const length = Math.floor(Math.random() * 3) + 10; // 10-12 digit
  return Math.floor(Math.random() * Math.pow(10, length)).toString().padStart(length, '0');
}

function generatePassword(prefix = 'ZYCHO') {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
  let random = '';
  for (let i = 0; i < 6; i++) random += chars[Math.floor(Math.random() * chars.length)];
  return `${prefix}_${random}_FF`;
}

function generateName(prefix = 'ZYCHO') {
  const suffix = Math.floor(Math.random() * 9000) + 1000;
  return `${prefix}${suffix}`;
}

function isRareAccount(uid) {
  // Cek pola cantik
  if (/^(\d)\1{5,}$/.test(uid)) return { isRare: true, score: 10, reason: 'Semua digit sama!' };
  if (/^(\d{3})\1$/.test(uid)) return { isRare: true, score: 8, reason: 'Pola berulang!' };
  if (/123456|234567|345678|456789|567890/.test(uid)) return { isRare: true, score: 7, reason: 'Sequential!' };
  if (uid === uid.split('').reverse().join('')) return { isRare: true, score: 6, reason: 'Palindrome!' };
  if (uid.length <= 8) return { isRare: true, score: 5, reason: 'UID pendek!' };
  return { isRare: false, score: 0 };
}

function createAccount(region, threadId) {
  const uid = generateUID();
  const password = generatePassword('ZYCHO');
  const name = generateName('ZYCHO');
  const accountId = generateUID(); // Account ID berbeda dari UID
  
  const rare = isRareAccount(accountId);
  
  return {
    uid,
    password,
    name,
    account_id: accountId,
    region: region === 'GHOST' ? 'GHOST' : region,
    thread_id: threadId,
    created_at: new Date().toISOString(),
    is_rare: rare.isRare,
    rare_score: rare.score,
    rare_reason: rare.reason
  };
}

async function startGeneration() {
  if (isGenerating) {
    stopGeneration();
    return;
  }
  
  const region = document.getElementById('regionSelect').value;
  const jumlah = parseInt(document.getElementById('jumlahAkun').value);
  const threads = parseInt(document.getElementById('threadCount').value);
  
  if (jumlah < 1 || jumlah > 500) {
    alert('Jumlah akun harus antara 1-500');
    return;
  }
  
  isGenerating = true;
  accounts = [];
  const startTime = Date.now();
  let generated = 0;
  let rareCount = 0;
  
  const btn = document.getElementById('generateBtn');
  btn.textContent = '⏹️ STOP GENERATE';
  btn.style.background = '#ef4444';
  
  const outputArea = document.getElementById('outputArea');
  outputArea.innerHTML = '';
  
  const totalTarget = jumlah;
  
  // Simulasi generate dengan multi-thread (async)
  const generateBatch = async () => {
    return new Promise((resolve) => {
      const interval = setInterval(() => {
        if (generated >= totalTarget || !isGenerating) {
          clearInterval(interval);
          resolve();
          return;
        }
        
        // Generate multiple accounts per tick (simulasi thread)
        const batchSize = Math.min(threads, totalTarget - generated);
        for (let i = 0; i < batchSize && generated < totalTarget; i++) {
          const account = createAccount(region, (generated % threads) + 1);
          accounts.push(account);
          
          if (account.is_rare) rareCount++;
          
          // Display account
          const accountDiv = document.createElement('div');
          accountDiv.className = `account-item ${account.is_rare ? 'success' : ''}`;
          accountDiv.style.animation = `fadeIn 0.2s ease`;
          accountDiv.innerHTML = `
            <div><span class="account-uid">🎮 ${account.uid}</span> | ${account.name}</div>
            <div style="font-size:0.65rem; margin-top:4px;">
              🔑 <span class="account-pass">${account.password}</span> | 
              📛 ID: ${account.account_id} | 
              🌍 ${account.region}
            </div>
            ${account.is_rare ? `<div style="color:var(--accent-tertiary); font-size:0.6rem; margin-top:4px;">💎 RARE! ${account.rare_reason} (Score: ${account.rare_score})</div>` : ''}
          `;
          outputArea.insertBefore(accountDiv, outputArea.firstChild);
          
          generated++;
          
          // Update stats
          document.getElementById('totalGenerated').textContent = generated;
          document.getElementById('totalRare').textContent = rareCount;
          
          const elapsed = (Date.now() - startTime) / 1000;
          const speed = (generated / elapsed).toFixed(1);
          document.getElementById('genSpeed').textContent = speed;
          document.getElementById('progressFill').style.width = `${(generated / totalTarget) * 100}%`;
          
          // Scroll ke atas
          outputArea.scrollTop = 0;
        }
      }, 50); // Super cepat!
    });
  };
  
  await generateBatch();
  
  if (isGenerating) {
    const elapsed = (Date.now() - startTime) / 1000;
    const speed = (generated / elapsed).toFixed(1);
    
    // Kirim laporan ke Telegram
    sendToTelegram(`✅ *GENERATE SELESAI*\n📊 ${generated} akun\n💎 ${rareCount} rare\n⚡ ${speed} akun/detik\n🌍 Region: ${region}`);
    
    outputArea.innerHTML += `<div style="text-align:center; padding:0.75rem; color:var(--accent-tertiary); border-top:1px solid var(--border); margin-top:0.5rem;">
      ✅ Selesai! ${generated} akun dalam ${elapsed.toFixed(1)} detik (${speed}/s)
    </div>`;
  }
  
  stopGeneration(false);
}

function stopGeneration(resetBtn = true) {
  isGenerating = false;
  if (resetBtn) {
    const btn = document.getElementById('generateBtn');
    btn.textContent = '🚀 MULAI GENERATE';
    btn.style.background = '';
  }
}

function downloadAllAccounts() {
  if (accounts.length === 0) {
    alert('Belum ada akun yang digenerate!');
    return;
  }
  
  const data = {
    generated_at: new Date().toISOString(),
    total: accounts.length,
    rare_count: accounts.filter(a => a.is_rare).length,
    accounts: accounts
  };
  
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `zycho_accounts_${Date.now()}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

// ========== REGISTER WEBHOOT KE TELEGRAM ==========
async function registerWebhook() {
  const webhookUrl = window.location.href.split('#')[0] + 'api';
  try {
    const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/setWebhook?url=${webhookUrl}`);
    const result = await response.json();
    console.log('Webhook registered:', result);
  } catch(e) {
    console.log('Webhook registration failed (running on static hosting):', e);
  }
}

// ========== HANDLE TELEGRAM COMMANDS (via polling) ==========
function startPolling() {
  let lastUpdateId = 0;
  
  setInterval(async () => {
    try {
      const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${lastUpdateId + 1}&timeout=30`);
      const data = await response.json();
      
      if (data.ok && data.result) {
        for (const update of data.result) {
          lastUpdateId = update.update_id;
          const message = update.message;
          if (message && message.text) {
            const chatId = message.chat.id;
            const text = message.text.trim();
            const fromId = message.from.id;
            
            // Simpan chat admin (user pertama yang chat jadi admin)
            const adminChatId = localStorage.getItem('admin_chat_id');
            if (!adminChatId) {
              localStorage.setItem('admin_chat_id', chatId);
            }
            
            // Handle commands
            if (text.startsWith('/approve')) {
              const parts = text.split(' ');
              if (parts.length >= 2) {
                const key = parts[1];
                const days = parseInt(parts[2]) || 7;
                addKey(key, days);
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    chat_id: chatId,
                    text: `✅ Key *${key}* telah di-approve selama ${days} hari!\n\nUser sekarang bisa akses generator.`,
                    parse_mode: 'Markdown'
                  })
                });
              }
            } else if (text.startsWith('/reject')) {
              const parts = text.split(' ');
              if (parts.length >= 2) {
                const key = parts[1];
                removeKey(key);
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    chat_id: chatId,
                    text: `❌ Key *${key}* telah ditolak.`,
                    parse_mode: 'Markdown'
                  })
                });
              }
            } else if (text === '/start') {
              await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  chat_id: chatId,
                  text: `🤖 *ZYCHO ID BOT*\n\nBot untuk mengelola akses generator akun Free Fire.\n\n📌 *Perintah:*\n/approve KEY [hari] - Approve key (default 7 hari)\n/reject KEY - Tolak key\n/stats - Lihat statistik key\n\n🔗 *Akses Generator:* ${window.location.href}`,
                  parse_mode: 'Markdown'
                })
              });
            } else if (text === '/stats') {
              const totalKeys = validKeys.length;
              const activeKeys = validKeys.filter(k => k.expiry > Date.now()).length;
              await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  chat_id: chatId,
                  text: `📊 *STATISTIK KEY*\nTotal key: ${totalKeys}\nKey aktif: ${activeKeys}\nKey expired: ${totalKeys - activeKeys}`,
                  parse_mode: 'Markdown'
                })
              });
            }
          }
        }
      }
    } catch(e) {
      console.log('Polling error:', e);
    }
  }, 2000);
}

// ========== INIT ==========
loadKeys();
startPolling();

// Demo key untuk testing (bisa dihapus)
if (validKeys.length === 0) {
  addKey('DEMO123', 1); // key demo expired 1 hari
}

// Cek session tersimpan
const savedKey = localStorage.getItem('last_used_key');
if (savedKey && checkKey(savedKey)) {
  document.getElementById('keyInput').value = savedKey;
  verifyAccessKey();
}

// Simpan key yang berhasil
window.saveUsedKey = (key) => {
  localStorage.setItem('last_used_key', key);
};

console.log('✅ ZYCHO ID BOT READY!');
console.log('Bot Token:', BOT_TOKEN);
console.log('Untuk approve key via console: addKey("CONTOHKEY", 7)');
</script>
