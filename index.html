<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<meta name="description" content="Koleksi prompt jailbreak premium untuk berbagai AI.">
<title>PromptVault — by zychoid</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg: #0a0c10;
  --bg-surface: #111317;
  --bg-card: #16181d;
  --bg-elevated: #1a1d24;
  --border: #23262e;
  --border-light: #2a2e38;
  --accent: #7c6eff;
  --accent-soft: #8b7eff;
  --accent-glow: rgba(124,110,255,0.08);
  --text: #ededee;
  --text-secondary: #9ca3af;
  --text-muted: #6b7280;
  --success: #34d399;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 20px;
  --shadow: 0 2px 8px rgba(0,0,0,0.2);
  --transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
}

[data-theme="light"] {
  --bg: #f1f5f9;
  --bg-surface: #ffffff;
  --bg-card: #ffffff;
  --bg-elevated: #f8fafc;
  --border: #e2e8f0;
  --border-light: #cbd5e1;
  --accent: #5b4eff;
  --text: #0f172a;
  --text-secondary: #475569;
  --text-muted: #94a3b8;
  --shadow: 0 2px 8px rgba(0,0,0,0.04);
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  padding-bottom: env(safe-area-inset-bottom);
}

/* Typography */
.logo, .card-title, .section-title {
  font-family: 'Space Grotesk', sans-serif;
  letter-spacing: -0.02em;
}

/* Scrollbar */
::-webkit-scrollbar {
  width: 4px;
  height: 4px;
}
::-webkit-scrollbar-track {
  background: transparent;
}
::-webkit-scrollbar-thumb {
  background: var(--border-light);
  border-radius: 10px;
}

/* Container */
.container {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 20px;
}

/* Header */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(16px);
  background: rgba(var(--bg-rgb, 10,12,16), 0.75);
  border-bottom: 1px solid var(--border);
}
[data-theme="light"] .header {
  background: rgba(255,255,255,0.8);
}
.header-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}
.logo-icon {
  width: 34px;
  height: 34px;
  background: linear-gradient(135deg, var(--accent), #a855f7);
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
}
.logo-icon svg {
  width: 18px;
  height: 18px;
  color: white;
}
.logo-text {
  font-size: 1.25rem;
  font-weight: 600;
  color: var(--text);
}
.logo-text span {
  color: var(--accent);
}
.header-actions {
  display: flex;
  align-items: center;
  gap: 12px;
}
.icon-btn {
  width: 36px;
  height: 36px;
  border-radius: 40px;
  border: 1px solid var(--border);
  background: var(--bg-surface);
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--transition);
}
.icon-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

/* Hero */
.hero {
  text-align: center;
  padding: 48px 20px 32px;
}
.hero h1 {
  font-size: clamp(1.8rem, 6vw, 3rem);
  font-weight: 700;
  margin-bottom: 12px;
  background: linear-gradient(135deg, var(--text), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hero p {
  color: var(--text-secondary);
  max-width: 420px;
  margin: 0 auto;
  font-size: 0.85rem;
}

/* Stats */
.stats {
  display: flex;
  gap: 28px;
  margin-bottom: 28px;
  padding: 16px 0;
  border-bottom: 1px solid var(--border);
}
.stat-item {
  display: flex;
  flex-direction: column;
}
.stat-value {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1.8rem;
  font-weight: 600;
  color: var(--accent);
  line-height: 1.2;
}
.stat-label {
  font-size: 0.65rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* Search */
.search-wrapper {
  margin-bottom: 28px;
}
.search-box {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 18px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 60px;
  transition: var(--transition);
}
.search-box:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.search-box svg {
  color: var(--text-muted);
  width: 18px;
  height: 18px;
  flex-shrink: 0;
}
.search-box input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-size: 0.9rem;
}
.search-box input::placeholder {
  color: var(--text-muted);
}

/* Layout 2 kolom - mobile first */
.dashboard {
  display: flex;
  flex-direction: column;
  gap: 24px;
}
@media (min-width: 768px) {
  .dashboard {
    flex-direction: row;
    align-items: flex-start;
  }
  .sidebar {
    width: 240px;
    flex-shrink: 0;
    position: sticky;
    top: 84px;
  }
  .content-area {
    flex: 1;
  }
}

/* Categories - horizontal scroll di mobile */
.sidebar-title {
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  margin-bottom: 12px;
}
.categories {
  display: flex;
  flex-direction: row;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 8px;
  scrollbar-width: thin;
}
@media (min-width: 768px) {
  .categories {
    flex-direction: column;
    overflow-x: visible;
  }
}
.cat-btn {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding: 8px 16px;
  border-radius: 40px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-secondary);
  font-size: 0.8rem;
  cursor: pointer;
  transition: var(--transition);
  white-space: nowrap;
}
@media (min-width: 768px) {
  .cat-btn {
    border-radius: var(--radius-sm);
    white-space: normal;
    justify-content: space-between;
  }
}
.cat-btn:hover {
  background: var(--bg-elevated);
  border-color: var(--border-light);
  color: var(--text);
}
.cat-btn.active {
  background: var(--accent-glow);
  border-color: var(--accent);
  color: var(--accent);
}
.cat-count {
  font-size: 0.65rem;
  background: var(--bg-elevated);
  padding: 2px 8px;
  border-radius: 20px;
}

/* Content header */
.content-header {
  display: flex;
  flex-wrap: wrap;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
}
.section-title {
  font-size: 1rem;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 8px;
}
.filters {
  display: flex;
  gap: 8px;
}
.filter-select {
  padding: 6px 14px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 40px;
  color: var(--text-secondary);
  font-size: 0.75rem;
  cursor: pointer;
  outline: none;
  transition: var(--transition);
}
.filter-select:focus {
  border-color: var(--accent);
}

/* Grid cards - mobile friendly */
.prompts-grid {
  display: flex;
  flex-direction: column;
  gap: 14px;
}
@media (min-width: 480px) {
  .prompts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }
}
.prompt-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 18px;
  cursor: pointer;
  transition: var(--transition);
}
.prompt-card:active {
  transform: scale(0.99);
}
.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
  flex-wrap: wrap;
  gap: 8px;
}
.category-tag {
  font-size: 0.6rem;
  font-weight: 600;
  padding: 4px 10px;
  background: var(--accent-glow);
  color: var(--accent);
  border-radius: 20px;
}
.new-badge {
  font-size: 0.55rem;
  font-weight: 700;
  padding: 3px 8px;
  background: linear-gradient(135deg, var(--accent), #a855f7);
  color: white;
  border-radius: 20px;
}
.card-title {
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 8px;
  line-height: 1.4;
}
.card-preview {
  font-size: 0.75rem;
  color: var(--text-secondary);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 12px;
}
.card-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}
.char-info {
  font-size: 0.65rem;
  color: var(--text-muted);
  background: var(--bg-elevated);
  padding: 3px 8px;
  border-radius: 20px;
}
.card-actions {
  display: flex;
  gap: 10px;
}
.action-btn {
  background: transparent;
  border: none;
  font-size: 0.7rem;
  padding: 4px 12px;
  border-radius: 20px;
  color: var(--text-secondary);
  cursor: pointer;
  transition: var(--transition);
}
.action-btn:hover {
  background: var(--bg-elevated);
  color: var(--accent);
}
.card-date {
  font-size: 0.6rem;
  color: var(--text-muted);
  margin-top: 8px;
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 60px 24px;
  color: var(--text-muted);
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
}

/* Pagination */
.pagination {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-top: 32px;
  flex-wrap: wrap;
}
.page-btn {
  min-width: 38px;
  height: 38px;
  padding: 0 10px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 0.8rem;
  transition: var(--transition);
}
.page-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}
.page-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}

/* Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(12px);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease;
}
.modal-overlay.open {
  opacity: 1;
  pointer-events: all;
}
.modal-container {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  width: 100%;
  max-width: 600px;
  max-height: 85vh;
  overflow-y: auto;
}
.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding: 20px 20px 0;
  gap: 16px;
}
.modal-title {
  font-size: 1.1rem;
  font-weight: 600;
}
.modal-body {
  padding: 20px;
}
.prompt-content {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 16px;
  font-family: monospace;
  font-size: 0.8rem;
  white-space: pre-wrap;
  max-height: 320px;
  overflow-y: auto;
}
.modal-footer {
  padding: 0 20px 20px;
}
.copy-full-btn {
  width: 100%;
  padding: 12px;
  background: var(--accent);
  border: none;
  border-radius: 60px;
  color: white;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
}
.copy-full-btn:active {
  transform: scale(0.97);
}
.close-modal {
  width: 32px;
  height: 32px;
  border-radius: 40px;
  border: 1px solid var(--border);
  background: var(--bg-elevated);
  color: var(--text-muted);
  cursor: pointer;
  transition: var(--transition);
}
.close-modal:hover {
  border-color: var(--accent);
  color: var(--accent);
}

/* Footer */
.footer {
  text-align: center;
  padding: 28px 20px;
  margin-top: 40px;
  border-top: 1px solid var(--border);
  color: var(--text-muted);
  font-size: 0.7rem;
}

/* Toast */
.copy-toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--bg-surface);
  border: 1px solid var(--success);
  padding: 10px 20px;
  border-radius: 60px;
  display: flex;
  align-items: center;
  gap: 8px;
  z-index: 1000;
  opacity: 0;
  visibility: hidden;
  transition: all 0.2s ease;
  font-size: 0.8rem;
  color: var(--success);
  box-shadow: var(--shadow);
}
.copy-toast.show {
  opacity: 1;
  visibility: visible;
  transform: translateX(-50%) translateY(0);
}

/* Loader */
.loader {
  text-align: center;
  padding: 40px;
  color: var(--text-muted);
}
</style>
</head>
<body>

<header class="header">
  <div class="container">
    <div class="header-inner">
      <a href="#" class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
          </svg>
        </div>
        <span class="logo-text">Prompt<span>Vault</span></span>
      </a>
      <div class="header-actions">
        <button class="icon-btn" onclick="toggleTheme()" aria-label="Toggle theme">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</header>

<section class="hero">
  <div class="container">
    <h1>Prompt Jailbreak</h1>
    <p>Koleksi prompt premium untuk berbagai AI. Akses penuh tanpa batas.</p>
  </div>
</section>

<main class="container">
  <div class="stats">
    <div class="stat-item">
      <div class="stat-value" id="statTotal">—</div>
      <div class="stat-label">Total Prompt</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="statCats">—</div>
      <div class="stat-label">Kategori</div>
    </div>
  </div>

  <div class="search-wrapper">
    <div class="search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Cari prompt...">
    </div>
  </div>

  <div class="dashboard">
    <aside class="sidebar">
      <div class="sidebar-title">Kategori</div>
      <div class="categories" id="catList"></div>
    </aside>
    <div class="content-area">
      <div class="content-header">
        <div class="section-title">
          <span id="activeLabel">Semua Prompt</span>
          <span class="cat-count" id="countLabel" style="background:var(--accent-glow);">0</span>
        </div>
        <div class="filters">
          <select id="lengthFilter" class="filter-select">
            <option value="all">Semua</option>
            <option value="short">Pendek</option>
            <option value="medium">Sedang</option>
            <option value="long">Panjang</option>
          </select>
          <select id="sortSel" class="filter-select">
            <option value="newest">Terbaru</option>
            <option value="oldest">Terlama</option>
            <option value="az">A-Z</option>
          </select>
        </div>
      </div>
      <div class="prompts-grid" id="promptsGrid"></div>
      <div class="pagination" id="pagination"></div>
    </div>
  </div>
</main>

<footer class="footer">
  <div class="container">
    PromptVault — by zychoid
  </div>
</footer>

<div id="modalOverlay" class="modal-overlay">
  <div class="modal-container">
    <div class="modal-header">
      <div><h3 class="modal-title" id="modalTitle"></h3></div>
      <button class="close-modal" onclick="closeModal()" aria-label="Close">✕</button>
    </div>
    <div class="modal-body">
      <div class="prompt-content" id="modalBody"></div>
    </div>
    <div class="modal-footer">
      <button class="copy-full-btn" onclick="copyModalContent()">📋 Salin Prompt</button>
    </div>
  </div>
</div>

<div id="copyToast" class="copy-toast">
  <span>✓</span>
  <span>Tersalin</span>
</div>

<script>
const SUPABASE_URL = 'https://ihykejeacueeitthgkze.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_W7N9zRqZlirQdLQvURiexA_Mj8Nvx5C';
const { createClient } = supabase;
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let prompts = [], categories = [], promptCategories = [];
let activeCat = 'all', searchQuery = '', sortBy = 'newest', lengthFilter = 'all';
let currentPage = 1, itemsPerPage = 10;
let currentPrompt = null;

async function loadData() {
  try {
    const [catsRes, promptsRes, pcRes] = await Promise.all([
      supabaseClient.from('categories').select('*').order('name'),
      supabaseClient.from('prompts').select('*').order('created_at', { ascending: false }),
      supabaseClient.from('prompt_categories').select('*')
    ]);
    categories = catsRes.data || [];
    const rawPrompts = promptsRes.data || [];
    promptCategories = pcRes.data || [];
    
    prompts = rawPrompts.map(p => {
      const catIds = promptCategories.filter(pc => pc.prompt_id === p.id).map(pc => pc.category_id);
      p.category_ids = catIds;
      p.categories = categories.filter(c => catIds.includes(c.id));
      p.charCount = p.content?.length || 0;
      p.lengthType = p.charCount < 1000 ? 'short' : (p.charCount <= 4000 ? 'medium' : 'long');
      return p;
    });
    document.getElementById('statTotal').textContent = prompts.length;
    document.getElementById('statCats').textContent = categories.length;
    renderCategories();
    applyFilters();
  } catch(e) {
    console.error(e);
    document.getElementById('promptsGrid').innerHTML = '<div class="empty-state">Gagal memuat data</div>';
  }
}

function renderCategories() {
  const container = document.getElementById('catList');
  let html = `<button class="cat-btn ${activeCat === 'all' ? 'active' : ''}" onclick="setCategory('all')"><span>📁 Semua</span><span class="cat-count">${prompts.length}</span></button>`;
  categories.forEach(cat => {
    const count = prompts.filter(p => p.category_ids.includes(cat.id)).length;
    html += `<button class="cat-btn ${activeCat === cat.id ? 'active' : ''}" onclick="setCategory('${cat.id}')"><span>📂 ${escapeHtml(cat.name)}</span><span class="cat-count">${count}</span></button>`;
  });
  container.innerHTML = html;
}

function setCategory(id) {
  activeCat = id;
  currentPage = 1;
  renderCategories();
  applyFilters();
}

function getFilteredPrompts() {
  let filtered = [...prompts];
  if (activeCat !== 'all') filtered = filtered.filter(p => p.category_ids.includes(activeCat));
  if (lengthFilter !== 'all') filtered = filtered.filter(p => p.lengthType === lengthFilter);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    filtered = filtered.filter(p => p.title.toLowerCase().includes(q) || p.content.toLowerCase().includes(q));
  }
  if (sortBy === 'oldest') filtered.sort((a,b) => new Date(a.created_at) - new Date(b.created_at));
  else if (sortBy === 'az') filtered.sort((a,b) => a.title.localeCompare(b.title));
  else filtered.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
  return filtered;
}

function applyFilters() {
  const filtered = getFilteredPrompts();
  document.getElementById('countLabel').textContent = filtered.length;
  const totalPages = Math.ceil(filtered.length / itemsPerPage);
  if (currentPage > totalPages) currentPage = Math.max(1, totalPages);
  const start = (currentPage - 1) * itemsPerPage;
  const pageData = filtered.slice(start, start + itemsPerPage);
  renderPrompts(pageData);
  renderPagination(filtered.length, totalPages);
}

function renderPrompts(data) {
  const grid = document.getElementById('promptsGrid');
  if (!data.length) {
    grid.innerHTML = '<div class="empty-state">✨ Belum ada prompt di kategori ini</div>';
    return;
  }
  grid.innerHTML = data.map(p => {
    const isNew = (new Date() - new Date(p.created_at)) < 4 * 60 * 60 * 1000;
    const catName = p.categories[0]?.name || 'Umum';
    const charDisplay = p.charCount >= 1000 ? (p.charCount/1000).toFixed(1)+'k' : p.charCount;
    return `
      <div class="prompt-card" onclick="openPrompt('${p.id}')">
        <div class="card-header">
          <span class="category-tag">${escapeHtml(catName)}</span>
          ${isNew ? '<span class="new-badge">NEW</span>' : ''}
        </div>
        <div class="card-title">${escapeHtml(p.title)}</div>
        <div class="card-preview">${escapeHtml(p.content.substring(0, 90))}...</div>
        <div class="card-meta">
          <span class="char-info">📄 ${charDisplay} karakter</span>
          <div class="card-actions">
            <button class="action-btn" onclick="event.stopPropagation();quickCopy('${p.id}',this)">Copy</button>
            <button class="action-btn" onclick="event.stopPropagation();quickDownload('${p.id}',this)">Download</button>
          </div>
        </div>
        <div class="card-date">${new Date(p.created_at).toLocaleDateString('id-ID')}</div>
      </div>
    `;
  }).join('');
}

function renderPagination(total, totalPages) {
  const container = document.getElementById('pagination');
  if (total <= itemsPerPage || totalPages <= 1) { container.innerHTML = ''; return; }
  let html = '';
  if (currentPage > 1) html += `<button class="page-btn" onclick="changePage(${currentPage-1})">‹</button>`;
  for (let i = Math.max(1, currentPage-2); i <= Math.min(totalPages, currentPage+2); i++) {
    html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
  }
  if (currentPage < totalPages) html += `<button class="page-btn" onclick="changePage(${currentPage+1})">›</button>`;
  container.innerHTML = html;
}

function changePage(page) { currentPage = page; applyFilters(); }
function openPrompt(id) { currentPrompt = prompts.find(p => p.id === id); if(currentPrompt) { document.getElementById('modalTitle').textContent = currentPrompt.title; document.getElementById('modalBody').textContent = currentPrompt.content; document.getElementById('modalOverlay').classList.add('open'); } }
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function showToast() { const t = document.getElementById('copyToast'); t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 1500); }
async function copyModalContent() { if(currentPrompt) { await navigator.clipboard.writeText(currentPrompt.content); showToast(); } }
async function quickCopy(id, btn) { const p = prompts.find(x => x.id === id); if(p) { await navigator.clipboard.writeText(p.content); showToast(); btn.textContent = '✓'; setTimeout(() => btn.textContent = 'Copy', 1000); } }
function quickDownload(id, btn) { const p = prompts.find(x => x.id === id); if(p) { const blob = new Blob([p.content], {type:'text/plain'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `${p.title.replace(/[^a-z0-9]/gi,'_')}.txt`; a.click(); URL.revokeObjectURL(a.href); btn.textContent = '✓'; setTimeout(() => btn.textContent = 'Download', 1000); } }
function escapeHtml(s) { if(!s) return ''; return String(s).replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

document.getElementById('searchInput')?.addEventListener('input', (e) => { searchQuery = e.target.value; currentPage = 1; applyFilters(); });
document.getElementById('sortSel')?.addEventListener('change', (e) => { sortBy = e.target.value; currentPage = 1; applyFilters(); });
document.getElementById('lengthFilter')?.addEventListener('change', (e) => { lengthFilter = e.target.value; currentPage = 1; applyFilters(); });
document.getElementById('modalOverlay')?.addEventListener('click', (e) => { if(e.target.id === 'modalOverlay') closeModal(); });
document.addEventListener('keydown', (e) => { if(e.key === 'Escape') closeModal(); });

function toggleTheme() { const html = document.documentElement; const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'; html.setAttribute('data-theme', next); localStorage.setItem('theme', next); }
const savedTheme = localStorage.getItem('theme') || 'dark';
document.documentElement.setAttribute('data-theme', savedTheme);

loadData();
</script>
